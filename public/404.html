<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found · Francesco Cataldo</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#f6f3ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)" />
  <script>
    // Apply the saved theme before paint to avoid a flash of the wrong theme.
    // Mirrors the pre-paint logic in index.html (localStorage 'theme': light/dark/system).
    (function () {
      try {
        var m = localStorage.getItem('theme');
        if (['light', 'dark', 'system'].indexOf(m) === -1) m = 'system';
        var dark = m === 'dark' ||
          (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f6f3ec;
      --paper2: #efeae0;
      --ink: #23201b;
      --ink-soft: #5c564b;
      --rule: #d8d1c2;
      --accent: #9a3b1f;
      --accent2: #1f5c4a;
    }
    [data-theme="dark"] {
      --paper: #1c1a17;
      --paper2: #232019;
      --ink: #e8e2d9;
      --ink-soft: #b3aa9b;
      --rule: #3a352d;
      --accent: #d4614a;
      --accent2: #5fae93;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background-color: var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      /* faint engineering grid */
      background-image:
        linear-gradient(var(--rule) 1px, transparent 1px),
        linear-gradient(90deg, var(--rule) 1px, transparent 1px);
      background-size: 48px 48px;
      background-position: center;
    }
    .card {
      background-color: var(--paper2);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 3rem 2.5rem;
      max-width: 32rem;
      width: 100%;
      text-align: center;
    }
    .code {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: clamp(4.5rem, 18vw, 9rem);
      line-height: 1;
      margin: 0;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .code span { color: var(--accent); }
    .label {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 1.25rem 0 0.5rem;
    }
    .lede {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.25rem, 4vw, 1.6rem);
      font-weight: 500;
      margin: 0.25rem 0 2rem;
      color: var(--ink);
    }
    .home {
      display: inline-block;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--paper);
      background-color: var(--accent);
      padding: 0.7rem 1.4rem;
      border-radius: 3px;
      transition: opacity 0.15s ease;
    }
    .home:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">4<span>0</span>4</p>
    <p class="label">Page not found</p>
    <p class="lede">This page took a wrong turn.</p>
    <a class="home" href="/">Back to home</a>
  </main>
</body>
</html>
