<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#d8d1c2" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- paper background -->
  <rect width="1200" height="1200" fill="#f6f3ec"/>

  <!-- the 1200x630 OG band lives between y=285 and y=915 (centered) -->
  <g transform="translate(0,285)">
    <!-- faint engineering grid clipped to the band -->
    <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

    <!-- frame -->
    <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#d8d1c2" stroke-width="2"/>

    <!-- eyebrow -->
    <text x="80" y="130" font-family="'Courier New', monospace" font-size="22" letter-spacing="6"
          fill="#9a3b1f" font-weight="600">PYTHON · DJANGO DEVELOPER · TURIN</text>

    <!-- name -->
    <text x="76" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="92"
          font-weight="600" fill="#23201b" letter-spacing="-2">Francesco Cataldo</text>

    <!-- tagline -->
    <text x="80" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="38"
          font-style="italic" fill="#5c564b">Data-heavy backends that stay fast under load.</text>

    <!-- accent rule -->
    <rect x="80" y="400" width="120" height="5" fill="#9a3b1f"/>

    <!-- stack -->
    <text x="80" y="495" font-family="'Courier New', monospace" font-size="25"
          fill="#1f5c4a" letter-spacing="1">Django · DRF · Celery · PostgreSQL · Vue 3 · Nuxt 3</text>

    <!-- url -->
    <text x="80" y="550" font-family="'Courier New', monospace" font-size="23"
          fill="#5c564b" letter-spacing="1">fracata00.github.io</text>
  </g>
</svg>
